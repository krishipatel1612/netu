<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess Cake</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

/* soft princess background */
background: linear-gradient(135deg,#ffe0f0,#ffd6a5,#cdb4db,#a2d2ff);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CENTER CARD (removes side empty feel) */
.card{
width:300px;
padding:20px;
background:rgba(255,255,255,0.7);
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* TITLE */
h2{
color:#6a1b9a;
margin-bottom:10px;
}

/* CAKE */
.cake{
width:180px;
height:200px;
margin:20px auto;
position:relative;
}

/* princess base */
.layer1{
width:180px;
height:70px;
background:linear-gradient(#ff99c8,#ff6b9d);
border-radius:100px;
position:absolute;
bottom:0;
box-shadow:0 8px 20px rgba(255,105,180,0.4);
}

/* middle */
.layer2{
width:150px;
height:60px;
background:linear-gradient(#fff,#ffe5ec);
border-radius:80px;
position:absolute;
bottom:60px;
left:15px;
}

/* top cream */
.cream{
width:120px;
height:45px;
background:linear-gradient(#fff,#fff0f6);
border-radius:60px;
position:absolute;
bottom:115px;
left:30px;
}

/* crown decoration 👑 */
.crown{
position:absolute;
top:-25px;
left:50%;
transform:translateX(-50%);
font-size:22px;
}

/* candle */
.candle{
width:8px;
height:40px;
background:#ff7f50;
position:absolute;
bottom:155px;
left:50%;
transform:translateX(-50%);
border-radius:3px;
cursor:pointer;
}

/* flame */
.flame{
width:12px;
height:12px;
background:yellow;
border-radius:50%;
position:absolute;
top:-12px;
left:-2px;
box-shadow:0 0 10px yellow;
animation:blink 0.5s infinite;
}

@keyframes blink{
50%{opacity:0.3;}
}

/* MESSAGE */
#msg{
font-size:20px;
color:#ff4081;
text-shadow:0 0 10px rgba(255,64,129,0.5);
margin-top:10px;
display:none;
animation:pop 1s ease;
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

/* BUTTON */
button{
padding:8px 12px;
border:none;
border-radius:10px;
background:#6a1b9a;
color:white;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<audio id="bgmusic" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>
<div class="card">



<div class="cake">

    <div class="crown">👑</div>

    <div class="cream"></div>
    <div class="layer2"></div>
    <div class="layer1"></div>

    <div class="candle" onclick="blow()">
        <div class="flame" id="flame"></div>
    </div>

</div>

<h1 id="msg"> Happy Birthday Princess 👼🏻</h1>

<button onclick="reset()">Reset</button>

</div>

<script>
function blow(){
document.getElementById("flame").style.display="none";
document.getElementById("msg").style.display="block";
}

function reset(){
document.getElementById("flame").style.display="block";
document.getElementById("msg").style.display="none";
}
</script>

</body>
</html>
<script>
let musicStarted = localStorage.getItem("musicStarted");

function startMusic(){
    let music = document.getElementById("bgmusic");

    if(music && music.paused){
        music.play().catch(()=>{});
        localStorage.setItem("musicStarted", "true");
    }
}

/* AUTO TRY ON PAGE LOAD */
window.addEventListener("load", ()=>{
    if(localStorage.getItem("musicStarted") === "true"){
        let music = document.getElementById("bgmusic");
        if(music){
            music.play().catch(()=>{});
        }
    }
});

/* FIRST CLICK START */
document.addEventListener("click", ()=>{
    startMusic();
});
</script>
